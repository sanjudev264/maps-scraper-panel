name: Google Maps Scraper

on:
  workflow_dispatch:
    inputs:
      include_categories:
        description: 'Categories to include (comma separated)'
        required: false
        default: ''
      exclude_domains:
        description: 'Domains to exclude (comma separated)'
        required: false
        default: ''

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Run Scraper
        # এখানে ইনপুটগুলোকে এনভায়রনমেন্ট ভেরিয়েবল (Environment Variables) হিসেবে স্ক্রিপ্টে পাস করা হচ্ছে
        env:
          INCLUDE_CATEGORIES: ${{ github.event.inputs.include_categories }}
          EXCLUDE_DOMAINS: ${{ github.event.inputs.exclude_domains }}
        run: node index.js  # আপনার স্ক্রিপ্টের নাম ভিন্ন হলে সেটি দিন (যেমন: scraper.js)
