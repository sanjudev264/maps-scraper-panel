name: Google Maps Lead Scraper

on:
  workflow_dispatch:
    inputs:
      include_categories:
        description: 'Categories to include'
        required: false
        default: ''
        type: string
      exclude_domains:
        description: 'Domains to exclude'
        required: false
        default: ''
        type: string
      min_rating:
        description: 'Minimum Rating'
        required: false
        default: '3'
        type: string
      max_rating:
        description: 'Maximum Rating'
        required: false
        default: '5'
        type: string

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 300  # 🎯 ৫০০টি লিড নিরাপদে স্ক্র্যাপ করার জন্য টাইমআউট ৩০০ মিনিট (৫ ঘণ্টা) রাখা হলো

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm init -y
          npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth fs

      - name: Run Scraper Script
        env:
          INCLUDE_CATEGORIES: ${{ github.event.inputs.include_categories }}
          EXCLUDE_DOMAINS: ${{ github.event.inputs.exclude_domains }}
          MIN_RATING: ${{ github.event.inputs.min_rating }}
          MAX_RATING: ${{ github.event.inputs.max_rating }}
        run: node scraper.js

      - name: Upload Output Artifact
        if: always()  # 🎯 জব বাতিল (Cancel) বা কোনো কারণে টাইমআউট হলেও সংগৃহীত ইউনিক লিডগুলো সেভ থাকবে
        uses: actions/upload-artifact@v4
        with:
          name: google-maps-leads
          path: output.csv
          retention-days: 7
