name: Google Maps Scraper

on:
  workflow_dispatch:
    inputs:
      include_categories:
        description: 'Categories to include'
        required: false
        default: ''
      exclude_domains:
        description: 'Domains to exclude'
        required: false
        default: ''

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: |
        npm install puppeteer-extra puppeteer-extra-plugin-stealth puppeteer

    # 💡 এখানে আমরা চেক করছি আপনার ফাইল index.js নাকি scraper.js, যেটিই হোক স্ক্রিপ্ট রান হবেই!
    - name: Run Scraper Script
      env:
        INCLUDE_CATEGORIES: ${{ github.event.inputs.include_categories }}
        EXCLUDE_DOMAINS: ${{ github.event.inputs.exclude_domains }}
      run: |
        if [ -f "scraper.js" ]; then
          node scraper.js
        else
          node index.js
        fi

    - name: Upload Output Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: google-maps-leads
        path: output.csv
