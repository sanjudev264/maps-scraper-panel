name: Google Maps Scraper

on:
  workflow_dispatch:
    inputs:
      include_categories:
        description: 'Categories to include'
        required: false
        default: ''
      exclude_domains:
        description: 'Domains to exclude'
        required: false
        default: ''

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: |
        npm install puppeteer-extra puppeteer-extra-plugin-stealth puppeteer

    # 🔍 ফাইল চেক করার স্টেপ (এরর থাকলে গিটহাব লগেই ধরা পড়বে)
    - name: Check Input File
      run: |
        if [ ! -f "input.csv" ]; then
          echo "❌ Error: input.csv file is missing in the workspace!"
          exit 1
        fi

    - name: Run Scraper Script
      env:
        INCLUDE_CATEGORIES: ${{ github.event.inputs.include_categories }}
        EXCLUDE_DOMAINS: ${{ github.event.inputs.exclude_domains }}
      run: |
        if [ -f "scraper.js" ]; then
          node scraper.js
        else
          node index.js
        fi

    # 💾 নির্দিষ্ট করে শুধু output.csv ফাইলটিই আপলোড হবে, ফাইল না থাকলে টাস্ক ফেইল্ড দেখাবে
    - name: Upload Output Artifact
      uses: actions/upload-artifact@v4
      with:
        name: google-maps-leads
        path: output.csv
        if-no-files-found: error
