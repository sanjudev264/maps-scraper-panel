<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Maps Lead Scraper Panel</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <style>
        body { background-color: #f3f4f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-3xl mx-auto bg-white p-8 rounded-xl shadow-lg border border-gray-200">
        <h2 class="text-3xl font-bold text-center text-indigo-600 mb-8">📍 Google Maps Lead Scraper Panel</h2>
        
        <div class="bg-yellow-50 p-4 rounded-lg border border-yellow-200 mb-6">
            <label class="block font-semibold text-yellow-800 mb-2">🔑 GitHub Personal Access Token:</label>
            <input type="password" id="token" class="w-full p-2 border border-yellow-300 rounded focus:outline-none focus:ring-2 focus:ring-yellow-500" placeholder="ghp_...">
            
            <label class="block font-semibold text-yellow-800 mt-4 mb-2">📦 Repository (username/repo-name):</label>
            <input type="text" id="repo" class="w-full p-2 border border-yellow-300 rounded focus:outline-none focus:ring-2 focus:ring-yellow-500" placeholder="sanjudev246/maps-scraper-panel">
        </div>

        <div class="space-y-6">
            <div>
                <label class="block font-bold text-gray-700 mb-2">১. ইনপুট ফাইল আপলোড করুন (input.csv):</label>
                <input type="file" id="inputFile" accept=".csv" class="w-full p-2 border border-gray-300 rounded bg-gray-50">
            </div>

            <div>
                <label class="block font-bold text-gray-700 mb-2">২. কোন ক্যাটাগরিগুলো রাখবেন (কমা দিয়ে আলাদা করুন):</label>
                <textarea id="categories" rows="3" class="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-indigo-500"></textarea>
            </div>

            <div>
                <label class="block font-bold text-gray-700 mb-2">৩. কোন ডোমেইনগুলো বাদ দেবেন (কমা দিয়ে আলাদা করুন):</label>
                <textarea id="domains" rows="3" class="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-indigo-500"></textarea>
            </div>

            <button onclick="startScraper()" id="runBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200">
                🚀 স্ক্র্যাপার রান করুন
            </button>
        </div>

        <div id="statusBox" class="mt-6 p-4 rounded-lg hidden text-center font-semibold"></div>
    </div>

    <script>
        // আগের টোকেন ও রেপো মনে রাখা
        document.getElementById('token').value = localStorage.getItem('git_token') || '';
        document.getElementById('repo').value = localStorage.getItem('git_repo') || '';

        async function startScraper() {
            const token = document.getElementById('token').value.trim();
            const repo = document.getElementById('repo').value.trim();
            const fileInput = document.getElementById('inputFile').files[0];
            const categories = document.getElementById('categories').value.trim();
            const domains = document.getElementById('domains').value.trim();
            const statusBox = document.getElementById('statusBox');
            const runBtn = document.getElementById('runBtn');

            if (!token || !repo || !fileInput) {
                alert("দয়া করে টোকেন, রেপো এবং ইনপুট CSV ফাইল সিলেক্ট করুন!");
                return;
            }

            localStorage.setItem('git_token', token);
            localStorage.setItem('git_repo', repo);

            runBtn.disabled = true;
            runBtn.innerText = "⏳ ফাইল আপলোড ও প্রসেস হচ্ছে...";
            statusBox.className = "mt-6 p-4 rounded-lg text-center font-semibold bg-blue-50 text-blue-700 block";
            statusBox.innerText = "গিটহাবে input.csv ফাইল পাঠানো হচ্ছে...";

            // ফাইল রিড করা এবং Base64 এ কনভার্ট করা
            const reader = new FileReader();
            reader.readAsText(fileInput);
            reader.onload = async function (e) {
                const csvContent = e.target.result;
                const base64Content = btoa(unescape(encodeURIComponent(csvContent)));

                try {
                    // ১. গিটহাবে input.csv ফাইলটি সরাসরি রাইট/আপডেট করা
                    let sha = "";
                    try {
                        const fileCheck = await fetch(`https://api.github.com/repos/${repo}/contents/input.csv`, {
                            headers: { "Authorization": `token ${token}` }
                        });
                        if (fileCheck.ok) {
                            const fileData = await fileCheck.json();
                            sha = fileData.sha;
                        }
                    } catch (err) {}

                    const uploadFile = await fetch(`https://api.github.com/repos/${repo}/contents/input.csv`, {
                        method: "PUT",
                        headers: {
                            "Authorization": `token ${token}`,
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            message: "Upload input.csv via Web Panel",
                            content: base64Content,
                            sha: sha ? sha : undefined
                        })
                    });

                    if (!uploadFile.ok) throw new Error("input.csv ফাইল গিটহাবে আপলোড করতে ব্যর্থ হয়েছে!");

                    statusBox.innerText = "🚀 ফাইল আপলোড সফল! এবার স্ক্র্যাপার ব্যাকগ্রাউন্ডে চালু করা হচ্ছে...";

                    // ২. গিটহাব অ্যাকশনস ট্রিপ করা (Workflow Dispatch)
                    const triggerWorkflow = await fetch(`https://api.github.com/repos/${repo}/actions/workflows/scrape.yml/dispatches`, {
                        method: "POST",
                        headers: {
                            "Authorization": `token ${token}`,
                            "Accept": "application/vnd.github.v3+json",
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            ref: "main",
                            inputs: {
                                include_categories: categories,
                                exclude_domains: domains
                            }
                        })
                    });

                    if (triggerWorkflow.status === 204) {
                        statusBox.className = "mt-6 p-4 rounded-lg text-center font-semibold bg-green-50 text-green-700 block";
                        statusBox.innerHTML = "🎉 স্ক্র্যাপার গিটহাব ক্লাউডে সফলভাবে চালু হয়েছে!<br><span class='text-sm text-gray-600'>আপনার ডাটার সাইজ অনুযায়ী ৫-১০ মিনিট পর গিটহাবের Actions ট্যাব থেকে জিপ ফাইলটি ডাউনলোড করে নিন।</span>";
                    } else {
                        throw new Error("Workflow রান করা যায়নি। scrape.yml ফাইলের নাম বা ভেতরের কোড চেক করুন।");
                    }

                } catch (error) {
                    statusBox.className = "mt-6 p-4 rounded-lg text-center font-semibold bg-red-50 text-red-700 block";
                    statusBox.innerText = "❌ এরর: " + error.message;
                } finally {
                    runBtn.disabled = false;
                    runBtn.innerText = "🚀 স্ক্র্যাপার রান করুন";
                }
            };
        }
    </script>
</body>
</html>
