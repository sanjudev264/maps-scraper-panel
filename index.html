<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Maps Scraper Panel</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f9f9f9; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="text"], input[type="password"], textarea, input[type="number"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .flex-group { display: flex; gap: 10px; }
        .flex-group input { width: 50%; }
        button { background-color: #5c4cee; color: white; padding: 12px 20px; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; }
        button:hover { background-color: #4a3bdb; }
        .status { margin-top: 15px; padding: 15px; border-radius: 4px; display: none; text-align: center; font-weight: bold; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚀 গুগল ম্যাপস লিড স্ক্র্যাপার প্যানেল</h2>
    
    <div class="form-group">
        <label>GitHub Personal Access Token:</label>
        <input type="password" id="github_token" placeholder="ghp_xxxxxxxxxxxx">
    </div>

    <div class="form-group">
        <label>Repository (username/repo-name):</label>
        <input type="text" id="repo_name" placeholder="sanjudev264/maps-scraper-panel">
    </div>

    <div class="form-group">
        <label>১. গুগল ম্যাপস লিঙ্ক দিন (একটার নিচে একটা পেস্ট করুন):</label>
        <textarea id="search_links" rows="4" placeholder="https://www.google.com/maps/search/..."></textarea>
    </div>

    <div class="form-group">
        <label>২. কোন ক্যাটাগরিগুলো রাখবেন (একটার নিচে একটা পেস্ট করুন):</label>
        <textarea id="include_categories" rows="3" placeholder="beauty salons&#10;salons&#10;Hair Salon"></textarea>
    </div>

    <div class="form-group">
        <label>৩. কোন ডোমেইনগুলো বাদ দেবেন (একটার নিচে একটা পেস্ট করুন):</label>
        <textarea id="exclude_domains" rows="3" placeholder="youtube.com&#10;linkedin.com"></textarea>
    </div>

    <div class="form-group">
        <label>৪. রেটিং ফিল্টার (Minimum & Maximum Rating):</label>
        <div class="flex-group">
            <input type="number" id="min_rating" placeholder="Min Rating (e.g. 3.5)" step="0.1" min="0" max="5">
            <input type="number" id="max_rating" placeholder="Max Rating (e.g. 5.0)" step="0.1" min="0" max="5">
        </div>
    </div>

    <button onclick="runScraper()">🚀 স্ক্র্যাপার রান করুন</button>

    <div id="status_box" class="status"></div>
</div>

<script>
// ফাইল কনটেন্টকে Base64 এ রূপান্তর করার হেল্পার ফাংশন
function utf8_to_b64(str) {
    return window.btoa(unescape(encodeURIComponent(str)));
}

async function runScraper() {
    const token = document.getElementById('github_token').value.trim();
    const repo = document.getElementById('repo_name').value.trim();
    const links = document.getElementById('search_links').value.trim();
    const categories = document.getElementById('include_categories').value.trim();
    const domains = document.getElementById('exclude_domains').value.trim();
    const minRating = document.getElementById('min_rating').value.trim() || "0";
    const maxRating = document.getElementById('max_rating').value.trim() || "5";

    if (!token || !repo || !links) {
        showStatus("❌ টোকেন, রেপোজিটরি এবং ম্যাপস লিঙ্ক দেওয়া বাধ্যতামূলক!", "error");
        return;
    }

    showStatus("⏳ গিটহাবের input.csv ফাইল আপডেট করা হচ্ছে...", "success");

    // CSV ফরম্যাটে ডেটা প্রস্তুত করা (প্যানেলের ইনপুট দিয়ে নতুন ফাইল তৈরি হবে)
    const csvContent = `"Search URL"\n` + links.split('\n').map(line => `"${line.trim().replace(/"/g, '""')}"`).join('\n');

    try {
        // ১. গিটহাবে থাকা বর্তমান input.csv ফাইলের SHA কোড নেওয়া (ফাইল আপডেট করতে SHA দরকার হয়)
        const fileUrl = `https://api.github.com/repos/${repo}/contents/input.csv`;
        let sha = null;
        
        const getFileRes = await fetch(fileUrl, {
            headers: { 'Authorization': `token ${token}` }
        });
        
        if (getFileRes.status === 200) {
            const fileData = await getFileRes.json();
            sha = fileData.sha;
        }

        // ২. নতুন ম্যাপস লিঙ্ক দিয়ে input.csv ফাইলটি গিটহাবে রাইট/আপডেট করা
        const updateFileRes = await fetch(fileUrl, {
            method: 'PUT',
            headers: {
                'Authorization': `token ${token}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                message: "🎯 Updated input.csv from Scraper Panel",
                content: utf8_to_b64(csvContent),
                sha: sha
            })
        });

        if (!updateFileRes.ok) {
            showStatus("❌ input.csv ফাইল আপডেট করতে ব্যর্থ হয়েছে!", "error");
            return;
        }

        showStatus("⏳ ফাইল আপডেট সফল! এবার ওয়ার্কফ্লো অ্যাকশন ট্রিগার করা হচ্ছে...", "success");

        // ৩. গিটহাব অ্যাকশন ওয়ার্কফ্লো রান করা
        const workflowUrl = `https://api.github.com/repos/${repo}/actions/workflows/scrape.yml/dispatches`;
        const workflowRes = await fetch(workflowUrl, {
            method: 'POST',
            headers: {
                'Authorization': `token ${token}`,
                'Accept': 'application/vnd.github.v3+json',
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                ref: 'main',
                inputs: {
                    include_categories: categories,
                    exclude_domains: domains,
                    min_rating: minRating,
                    max_rating: maxRating
                }
            })
        });

        if (workflowRes.status === 204) {
            showStatus("🎉 অভিনন্দন! input.csv আপডেট হয়েছে এবং স্ক্র্যাপিং সফলভাবে শুরু হয়েছে।", "success");
        } else {
            const errData = await workflowRes.json();
            showStatus(`❌ ওয়ার্কফ্লো ট্রিগার ব্যর্থ: ${errData.message}`, "error");
        }
    } catch (err) {
        showStatus(`❌ এরর: ${err.message}`, "error");
    }
}

function showStatus(msg, type) {
    const statusBox = document.getElementById('status_box');
    statusBox.style.display = 'block';
    statusBox.className = `status ${type}`;
    statusBox.innerText = msg;
}
</script>
</body>
</html>
